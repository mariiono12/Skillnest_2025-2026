<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear una cuenta en Discord</title>
</head>
<body>

    <h1>Crear una cuenta en Discord</h1>

    <form action="#" method="POST">
        
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
        </div>
        <br>

        <div>
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido">
        </div>
        <br>

        <div>
            <label for="correo">Correo electrónico:</label>
            <input type="text" id="correo" name="correo">
        </div>
        <br>

        <div>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password">
        </div>
        <br>

        <div>
            <label for="confirmar-password">Confirmar contraseña:</label>
            <input type="password" id="confirmar-password" name="confirmar_password">
        </div>
        <br>

        <div>
            <label for="fecha-nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha-nacimiento" name="fecha_nacimiento">
        </div>
        <br>

        <fieldset>
            <legend>Género:</legend>
            
            <input type="radio" id="genero-m" name="genero" value="masculino">
            <label for="genero-m">Masculino</label>
            
            <input type="radio" id="genero-f" name="genero" value="femenino">
            <label for="genero-f">Femenino</label>
            
            <input type="radio" id="genero-o" name="genero" value="otro">
            <label for="genero-o">Prefiero no decirlo</label>
        </fieldset>
        <br>

        <div>
            <label for="biografia">Descripción sobre ti:</label>
            <br>
            <textarea id="biografia" name="biografia" rows="4" cols="50"></textarea>
        </div>
        <br>

        <div>
            <label for="intereses">Selecciona tus intereses:</label>
            <br>
            <select id="intereses" name="intereses" multiple size="4">
                <option value="musica">Música</option>
                <option value="peliculas">Películas</option>
                <option value="deportes">Deportes</option>
                <option value="tecnologia">Tecnología</option>
            </select>
        </div>
        <br>

        <div>
            <input type="checkbox" id="terminos" name="terminos" value="aceptado">
            <label for="terminos">Al registrarte, aceptas los <a href="#">Términos y condiciones</a> de Discord.</label>
        </div>
        <br>

        <div>
            <input type="submit" value="Registrarse">
        </div>

    </form>

</body>
</html>
