<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Usuario</title>
    <link rel="stylesheet" href="tarjet.css">
</head>
<body>
    <div class="container">
        <div class="user-card">
            <div class="profile-image">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQk7kkqxWIm53JNr7WBLChuRpVnB9Gi1lkU5Q5_m3Y-ew&s=10" alt="Lisa Simpson">
            </div>
            
            <div class="user-info">
                <h2>Lisa Simpson</h2>
                <p class="role">Desarrolladora web</p>
                <p class="bio">
                    Apasionada por el diseño web y la tecnología. Siempre en busca de nuevos retos
                </p>
                
                <div class="social-links">
                    <a href="#" class="social-link">GitHub</a>
                    <a href="#" class="social-link">LinkedIn</a>
                </div>
                
                <button class="contact-btn">Conectar</button>
            </div>
        </div>
    </div>
</body>
</html>
