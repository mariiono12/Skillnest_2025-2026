<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería</title>
    <link rel="stylesheet" href="diseño.css">
</head>
<body>
    <div class="container">
        <h1>Galería de octogatos</h1>

        <div class="row">
            <div class="image-card">
                <img src="https://octodex.github.com/images/yogitocat.png" alt="octogato meditando">
            </div>
            <div class="image-card">
            <img src="https://octodex.github.com/images/boxertocat_octodex.jpg" alt="octogato boxeador">
            </div>
            <div class="image-card">
                <img src="https://octodex.github.com/images/luchadortocat.png" alt="octogato luchador">
            </div>
        </div>
    </div>

    <div class="row">
            <div class="image-card">
                <img src="https://octodex.github.com/images/Professortocat_v2.png" alt="Professortocat">
            </div>
            <div class="image-card">
                <img src="https://octodex.github.com/images/Sentrytocat_octodex.jpg" alt="Sentrytocat">
            </div>
    </div>

    <div class="row">
            <div class="image-card">
                <img src="https://octodex.github.com/images/vinyltocat.png" alt="Vinyltocat">
            </div>
            <div class="image-card">
                <img src="https://octodex.github.com/images/maxtocat.gif" alt="Maxtocat">
            </div>
            <div class="image-card">
                <img src="https://octodex.github.com/images/octofez.png" alt="Octofez">
            </div>
    </div>       
</body>
</html>
